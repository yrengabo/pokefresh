<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Ubicación</title>
</head>
<body>

<h2>Mis coordenadas</h2>
<button onclick="obtenerUbicacion()">Obtener GPS</button>

<p id="resultado"></p>

<script>
function obtenerUbicacion() {
    navigator.geolocation.getCurrentPosition(
        function(pos) {
            document.getElementById("resultado").innerHTML = `
                Latitud: ${pos.coords.latitude}<br>
                Longitud: ${pos.coords.longitude}<br>
                Precisión: ${pos.coords.accuracy.toFixed(1)} metros
            `;
        },
        function(err) {
            document.getElementById("resultado").innerHTML =
                "Error: " + err.message;
        },
        {
            enableHighAccuracy: true
        }
    );
}
</script>

</body>
</html>
